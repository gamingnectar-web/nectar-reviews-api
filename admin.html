<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nectar Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 40px; background: #f3f4f6; color: #111827; max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #e5e7eb; padding-bottom: 20px; }
        .review-card { background: white; padding: 25px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; justify-content: space-between; gap: 20px;}
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; text-transform: uppercase; margin-top: 10px; display: inline-block;}
        .pending { background: #fef08a; color: #854d0e; }
        .accepted { background: #bbf7d0; color: #166534; }
        .btn { cursor: pointer; padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; font-size: 14px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.8; }
        .approve-btn { background: #000; color: white; margin-right: 10px; }
        .delete-btn { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin: 0; font-weight: 800;">Nectar Reviews</h1>
        <span style="color: #6b7280;">Admin Dashboard</span>
    </div>
    <div id="admin-feed">Loading reviews...</div>

    <script>
        async function loadAdminReviews() {
            try {
                const res = await fetch('/api/admin/reviews');
                const reviews = await res.json();
                const container = document.getElementById('admin-feed');
                
                if (reviews.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#6b7280; padding: 40px;">No reviews found in database.</p>';
                    return;
                }

                container.innerHTML = reviews.map(r => `
                    <div class="review-card">
                        <div style="flex-grow: 1;">
                            <div style="font-size: 18px; font-weight: 800; margin-bottom: 8px;">
                                ${r.headline || 'No Headline'} 
                                <span style="color:#fbbf24;">${'★'.repeat(r.rating)}</span>
                            </div>
                            <div style="color: #4b5563; line-height: 1.5; margin-bottom: 12px;">"${r.comment}"</div>
                            <div style="font-size: 13px; color: #9ca3af;">From: ${r.userId} • ${new Date(r.createdAt).toLocaleDateString()}</div>
                            <span class="badge ${r.status}">${r.status}</span>
                        </div>
                        <div style="flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; justify-content: center;">
                            ${r.status === 'pending' ? `<button class="btn approve-btn" onclick="updateStatus('${r._id}', 'accepted')">Approve</button>` : ''}
                            <button class="btn delete-btn" onclick="deleteReview('${r._id}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('admin-feed').innerHTML = 'Error loading reviews.';
            }
        }

        async function updateStatus(id, status) {
            await fetch('/api/reviews/' + id, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            loadAdminReviews();
        }

        async function deleteReview(id) {
            if(confirm('Are you sure you want to delete this forever?')) {
                await fetch('/api/reviews/' + id, { method: 'DELETE' });
                loadAdminReviews();
            }
        }

        loadAdminReviews();
    </script>
</body>
</html>
